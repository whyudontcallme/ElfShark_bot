<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElfShark - Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <!-- Age Verification Modal -->
    <div id="ageModal" class="modal active">
        <div class="modal-content">
            <h2>Verify Your Age</h2>
            <p>This site sells e-liquids and smoking products. You must be 18+ to enter.</p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="rejectAge()">No, under 18</button>
                <button class="btn btn-primary" onclick="confirmAge()">Yes, 18+</button>
            </div>
        </div>
    </div>

    <!-- Welcome Modal -->
    <div id="welcomeModal" class="modal">
        <div class="modal-content welcome-content">
            <h1>🦈 ElfShark</h1>
            <p>store. Enjoy your shopping!</p>
            
            <div class="settings-section">
                <h3>Select a language:</h3>
                <div class="language-list">
                    <button class="lang-btn" data-lang="uk">
                        <img src="https://flagcdn.com/w40/ua.png" alt="UA"> Ukrainian
                    </button>
                    <button class="lang-btn active" data-lang="en">
                        <img src="https://flagcdn.com/w40/gb.png" alt="EN"> English
                    </button>
                    <button class="lang-btn" data-lang="pl">
                        <img src="https://flagcdn.com/w40/pl.png" alt="PL"> Polish
                    </button>
                    <button class="lang-btn" data-lang="ru">
                        <img src="https://flagcdn.com/w40/ru.png" alt="RU"> Russian
                    </button>
                </div>
            </div>

            <div class="settings-section">
                <h3>Select a currency:</h3>
                <div class="currency-list">
                    <button class="currency-btn" data-currency="PLN">PLN</button>
                    <button class="currency-btn" data-currency="UAH">UAH</button>
                    <button class="currency-btn active" data-currency="RUB">RUB</button>
                    <button class="currency-btn" data-currency="USD">USD</button>
                </div>
            </div>

            <div class="settings-section">
                <h3>Select a theme:</h3>
                <div class="theme-toggle">
                    <span>Light</span>
                    <label class="switch">
                        <input type="checkbox" id="themeSwitch" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Dark</span>
                </div>
            </div>

            <button class="btn btn-primary btn-large" onclick="goToShop()">
                Go To Shop <span>→</span>
            </button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <h1>Vampire Puffs</h1>
                <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
            </div>
            <div class="nav-tabs">
                <button class="tab active" data-tab="catalog">Каталог</button>
                <button class="tab" data-tab="settings">Настройки</button>
            </div>
        </header>

        <!-- Catalog Tab -->
        <div id="catalogTab" class="tab-content active">
            <!-- Search -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск" oninput="searchProducts()">
            </div>

            <!-- Categories -->
            <div class="categories-section">
                <h2>Категории</h2>
                <div class="categories-grid" id="categoriesGrid">
                    <!-- Categories will be loaded here -->
                </div>
            </div>

            <!-- All Products -->
            <div class="products-section">
                <div class="section-header">
                    <h2>Все товары</h2>
                    <select id="sortSelect" onchange="sortProducts()">
                        <option value="default">Сортировать по</option>
                        <option value="price_asc">Цена: по возрастанию</option>
                        <option value="price_desc">Цена: по убыванию</option>
                        <option value="name">По названию</option>
                    </select>
                </div>
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settingsTab" class="tab-content">
            <div class="settings-panel">
                <h2>Настройки</h2>
                <!-- Settings content -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-nav="catalog" onclick="switchNav('catalog')">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Каталог</span>
            </button>
            <button class="nav-item" data-nav="history" onclick="switchNav('history')">
                <span class="nav-icon">📜</span>
                <span class="nav-label">История</span>
            </button>
            <button class="nav-item" data-nav="favorites" onclick="switchNav('favorites')">
                <span class="nav-icon">❤️</span>
                <span class="nav-label">Избранное</span>
            </button>
            <button class="nav-item" data-nav="cart" onclick="switchNav('cart')">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">Корзина</span>
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </nav>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content cart-modal">
            <h2>🛒 Корзина</h2>
            <div id="cartItems"></div>
            <div class="cart-total">
                <span>Итого:</span>
                <span id="cartTotal">0 ₽</span>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeCart()">Продолжить покупки</button>
                <button class="btn btn-primary" onclick="checkout()">Оформить заказ</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
